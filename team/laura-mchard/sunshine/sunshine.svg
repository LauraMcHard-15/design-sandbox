<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#7EC8E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6EA8;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFF176;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFD600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFD600;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="seaGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#4FC3F7" />
      <stop offset="100%" style="stop-color:#0277BD" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyGrad)" />

  <!-- Sun glow -->
  <circle cx="400" cy="210" r="160" fill="url(#sunGlow)" />

  <!-- Sun rays — long -->
  <g transform="translate(400,210)" fill="#FFB300" opacity="0.9">
    <polygon points="0,-170 -12,-110 12,-110" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(30)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(60)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(90)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(120)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(150)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(180)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(210)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(240)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(270)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(300)" />
    <polygon points="0,-170 -12,-110 12,-110" transform="rotate(330)" />
  </g>

  <!-- Sun rays — short, between -->
  <g transform="translate(400,210)" fill="#FFCA28" opacity="0.75">
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(15)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(45)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(75)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(105)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(135)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(165)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(195)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(225)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(255)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(285)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(315)" />
    <polygon points="0,-145 -8,-100 8,-100" transform="rotate(345)" />
  </g>

  <!-- Sun body -->
  <circle cx="400" cy="210" r="95" fill="url(#sunGrad)" filter="url(#glow)" />

  <!-- Sun face — Greek-style stylised -->
  <!-- Eyes -->
  <ellipse cx="375" cy="200" rx="10" ry="8" fill="#E65100" />
  <ellipse cx="425" cy="200" rx="10" ry="8" fill="#E65100" />
  <ellipse cx="375" cy="200" rx="5" ry="5" fill="#BF360C" />
  <ellipse cx="425" cy="200" rx="5" ry="5" fill="#BF360C" />
  <!-- Nose — simple Greek straight nose -->
  <line x1="400" y1="208" x2="400" y2="224" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="400" y1="224" x2="392" y2="224" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mouth — serene smile -->
  <path d="M 383 235 Q 400 248 417 235" fill="none" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brow lines — classical Greek -->
  <path d="M 363 190 Q 375 184 387 190" fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <path d="M 413 190 Q 425 184 437 190" fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>

  <!-- Greek key border around sun (meander) -->
  <g fill="none" stroke="#FFD600" stroke-width="3" opacity="0.85">
    <!-- top segment -->
    <polyline points="310,108 310,98 330,98 330,88 350,88 350,98 370,98 370,88 390,88 390,98 410,98 410,88 430,88 430,98 450,98 450,88 470,88 470,98 490,98 490,108"/>
  </g>

  <!-- Sea / Aegean -->
  <ellipse cx="400" cy="490" rx="520" ry="120" fill="url(#seaGrad)" />
  <rect x="0" y="490" width="800" height="110" fill="#0277BD" />

  <!-- Sea shimmer lines -->
  <g stroke="#81D4FA" stroke-width="1.5" opacity="0.5">
    <path d="M 80 460 Q 120 455 160 460" fill="none"/>
    <path d="M 200 470 Q 250 465 300 470" fill="none"/>
    <path d="M 500 465 Q 550 460 600 465" fill="none"/>
    <path d="M 620 478 Q 670 472 720 478" fill="none"/>
    <path d="M 100 480 Q 160 474 220 480" fill="none"/>
    <path d="M 340 458 Q 400 452 460 458" fill="none"/>
